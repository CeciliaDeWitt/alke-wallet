<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
    <h2>Enviar Dinero</h2>

    <p>Buscar en la agenda de transferencias:</p>

    <input type="text">

    <h3>Contactos</h3>
    <p>John Doe CBU: 123456789, Alias: john.doe, Banco: ABC Bank</p>

    <p>Jane Smith CBU: 987654321, Alias: jane.smith, Banco: XYZ Bank</p>

    <p>Monto a enviar</p>

    <input type="number" id="montoEnvio" class="form-control" placeholder="Ingrese monto">

    <br>
    
    <button id="btnEnviarDinero" class="btn btn-primary">Enviar dinero</button>
    <button id="btnBuscar" class="btn btn-secondary">Buscar</button>
    <button id="btnAgregarContacto" class="btn btn-success">Agregar nuevo contacto</button>

    <div id="formContacto" style="display:none;">
        <h3>Nuevo contacto</h3>

        <input type="text" id="nombreContacto" class="form-control" placeholder="Nombre y apellido">
        <br>

        <input type="text" id="cbuContacto" class="form-control" placeholder="Número de CBU">
        <br>

        <input type="text" id="aliasContacto" class="form-control" placeholder="Alias">
        <br>

        <input type="text" id="bancoContacto" class="form-control" placeholder="Nombre del banco">
        <br>

        <button id="btnGuardarContacto" class="btn btn-primary">Guardar contacto
        </button>

        <button id="btnCancelarContacto" class="btn btn-secondary" type="button">
        Cancelar
        </button>

    </div>

<p id="mensajeEnviar"></p>

    <a href="menu.html" class="btn btn-secondary">Volver al menú principal</a>

    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
